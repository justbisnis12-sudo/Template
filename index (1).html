<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator Tiket</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      padding: 2rem;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e8f0fe;
      color: #1a56db;
      margin-left: 8px;
      font-weight: 500;
    }

    .section { margin-bottom: 1.25rem; }

    label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, select:focus, textarea:focus { border-color: #888; }

    textarea { resize: vertical; min-height: 180px; line-height: 1.6; }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: .75rem;
    }

    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn-primary { background: #1a1a1a; color: #fff; border: none; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { background: transparent; color: #1a1a1a; border: 1px solid #c0c0c0; }
    .btn-secondary:hover { background: #f0f0f0; }
    .btn-danger { background: transparent; color: #b91c1c; border: 1px solid #fca5a5; }
    .btn-danger:hover { background: #fef2f2; }

    .divider { border: none; border-top: 1px solid #ebebeb; margin: 1.5rem 0; }

    .output-box {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 13px;
      font-family: 'Courier New', Courier, monospace;
      white-space: pre;
      line-height: 1.75;
      color: #1a1a1a;
      min-height: 80px;
      overflow-x: auto;
    }

    .copy-feedback { font-size: 12px; color: #16a34a; opacity: 0; transition: opacity 0.3s; }

    .link-box {
      background: #f0f6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      font-family: 'Courier New', Courier, monospace;
      word-break: break-all;
      color: #1d4ed8;
      margin-top: 8px;
    }

    /* Modal */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.5rem;
      width: min(520px, 95vw);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }

    .tpl-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }

    .tpl-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
    }

    .tpl-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
    .tpl-item-btns { display: flex; gap: 6px; flex-shrink: 0; }

    .hint { font-size: 11px; color: #888; margin-top: 4px; }
    .hint code { background: #f0f0f0; padding: 1px 4px; border-radius: 4px; font-family: monospace; }

    @media (prefers-color-scheme: dark) {
      body { background: #141414; color: #e8e8e8; }
      .container, .modal { background: #1e1e1e; border-color: #333; }
      h1, .modal h2 { color: #e8e8e8; }
      label { color: #aaa; }
      input[type="text"], select, textarea {
        background: #2a2a2a; border-color: #444; color: #e8e8e8;
      }
      input[type="text"]:focus, select:focus, textarea:focus { border-color: #888; }
      .btn-primary { background: #e8e8e8; color: #1a1a1a; }
      .btn-secondary { color: #e8e8e8; border-color: #555; }
      .btn-secondary:hover { background: #2a2a2a; }
      .btn-danger { color: #fca5a5; border-color: #7f1d1d; }
      .btn-danger:hover { background: #2d1010; }
      .output-box { background: #252525; border-color: #333; color: #e8e8e8; }
      .divider { border-color: #333; }
      .badge { background: #1e3a5f; color: #93c5fd; }
      .link-box { background: #1e2d40; border-color: #2563eb; color: #93c5fd; }
      .tpl-item { background: #252525; border-color: #333; }
      .hint { color: #777; }
      .hint code { background: #333; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Generator Tiket <span class="badge" id="badge-count">6 template</span></h1>

    <div class="section">
      <label for="pabx">PABX / Nomor HP</label>
      <input type="text" id="pabx" placeholder="cth: 08123456789" />
    </div>

    <div class="section">
      <label for="template">Template Tiket</label>
      <select id="template"></select>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="generate()">Generate Tiket</button>
      <button class="btn-secondary" onclick="clearAll()">Bersihkan</button>
      <button class="btn-secondary" onclick="openManager()">Kelola Template ✦</button>
    </div>

    <hr class="divider" />

    <div class="section">
      <label>Hasil Generate</label>
      <div class="output-box" id="output">Isi PABX dan pilih template, lalu klik Generate Tiket...</div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="copyText()">Salin Teks</button>
      <button class="btn-secondary" onclick="openGithub()">Buka di GitHub Gist ↗</button>
      <span class="copy-feedback" id="copy-fb">✓ Tersalin!</span>
    </div>

    <div id="gh-area" style="display:none;">
      <label>Link GitHub Gist</label>
      <div class="link-box" id="gh-link"></div>
    </div>
  </div>

  <!-- Modal Kelola Template -->
  <div class="modal-bg" id="modal" style="display:none;" onclick="bgClose(event)">
    <div class="modal">
      <h2 id="modal-title">Kelola Template</h2>

      <div style="display:flex;gap:8px;margin-bottom:1rem;">
        <button id="tab-list-btn" class="btn-primary" onclick="showTab('list')">Daftar Template</button>
        <button id="tab-add-btn" class="btn-secondary" onclick="showTab('add')">+ Tambah Baru</button>
      </div>

      <!-- Tab Daftar -->
      <div id="tab-list">
        <div class="tpl-list" id="tpl-list"></div>
      </div>

      <!-- Tab Tambah/Edit -->
      <div id="tab-add" style="display:none;">
        <input type="hidden" id="edit-index" value="-1" />
        <div class="section">
          <label>Nama Template</label>
          <input type="text" id="new-name" placeholder="cth: WSA Teknis Mobile" />
        </div>
        <div class="section">
          <label>Isi Template</label>
          <p class="hint">Gunakan kata <code>PABX</code> sebagai pengganti nomor HP. Contoh: <code>PABX / NoIH / Case / [HVC]</code></p>
          <textarea id="new-body" placeholder="PABX / NoIH / Case / [HVC]&#10;[bracket segment]&#10;Nama Pelanggan : "></textarea>
        </div>
        <div class="btn-row">
          <button class="btn-primary" onclick="saveTemplate()">Simpan</button>
          <button class="btn-secondary" onclick="showTab('list')">Batal</button>
        </div>
      </div>

      <hr class="divider" />
      <div style="text-align:right;">
        <button class="btn-secondary" onclick="closeManager()">Tutup</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT = [
      {name:"1. WSA Teknis Fixed — Non Obsolete", body:`PABX / NoIH / Case / [HVC]
[bracket segment]
Nama Pelanggan : 
Cust ID / akun pelanggan :
CP :
Detail case :
Lapul/Gaul:
Status Nomor di DSC: 
Sub Status:-
Status Pembayaran: 
Type ONT (khusus muncul status ONT Obsolete): 
Capt lightshoot : 
KATEGORI : `},
      {name:"2. WSA Teknis Fixed — Obsolete", body:`PABX / NoIH / Perlu pergantian ONT karena Obsolete / Type ONT / [HVC]
[bracket segment]
Nama Pelanggan : 
Cust ID / akun pelanggan :
CP :
Detail case :
Lapul/Gaul:
Status Nomor di DSC: 
Sub Status:-
Status Pembayaran: 
Type ONT (khusus muncul status ONT Obsolete): 
Capt lightshoot : 
KATEGORI : `},
      {name:"3. WSA Non Teknis Fixed (+ Ordering)", body:`PABX / NoIH / Case / [HVC]
[bracket segment]    
Nama Pelanggan : 
Cust ID / akun pelanggan :    
CP :    
Email:    
Detail case : 
Tgl Kejadian:  
Order ID permintaan :     
Status Order :    
Solusi yang diberikan:   
Lapul/Gaul:       
Capt lightshoot :    
KATEGORI : (pilih salah satu KATEGORI URGENSI CASE)    `},
      {name:"4. Non WSA Profiling", body:`PABX / NoIH / Case / [HVC]
[bracket segment]    
Nama Pelanggan :
Cust ID / akun pelanggan :
NIK:
TTL:     
CP :    
Email:    
Detail case :       
Solusi yang diberikan:         
Capt lightshoot :    
KATEGORI :  `},
      {name:"5. Non WSA Billing", body:`PABX / NoIH / Case / [HVC]
[bracket segment]
Nama Pelanggan : 
Cust ID / akun pelanggan :
CP :
Email:
Detail case :
Order ID permintaan (Jika ada): 
FA ID (bukan capture)
Tanggal kejadian:
Solusi yang diberikan:
Lapul/Gaul:
Status Nomor di DSC: 
Sub Status:-
Status Pembayaran: 
Capt lightshoot FA:
KATEGORI : `},
      {name:"6. General", body:`PABX / NoIH / Case / [HVC]
[bracket segment]
Nama Pelanggan : 
Cust ID / akun pelanggan :
CP :
Email :
OrderID 
Status order :
Detail case :
Tanggal kejadian
Solusi yang diberikan:
Lapul / Gaul :
Capt lightshoot : 
KATEGORI : 
K-Kontak :`},
    ];

    function loadTemplates() {
      try { return JSON.parse(localStorage.getItem("tiket_templates")) || DEFAULT.map(t => ({...t})); }
      catch { return DEFAULT.map(t => ({...t})); }
    }
    function saveTemplates(arr) {
      try { localStorage.setItem("tiket_templates", JSON.stringify(arr)); } catch {}
    }

    let templates = loadTemplates();
    let lastGenerated = "";

    function rebuildSelect() {
      const sel = document.getElementById("template");
      const cur = sel.value;
      sel.innerHTML = "";
      templates.forEach((t, i) => {
        const o = document.createElement("option");
        o.value = i; o.textContent = t.name;
        sel.appendChild(o);
      });
      if (cur !== "" && cur < templates.length) sel.value = cur;
      document.getElementById("badge-count").textContent = templates.length + " template";
    }

    function generate() {
      const pabx = document.getElementById("pabx").value.trim() || "PABX";
      const idx = document.getElementById("template").value;
      const tpl = templates[idx];
      if (!tpl) return;
      lastGenerated = tpl.body.replace(/PABX/g, pabx);
      document.getElementById("output").textContent = lastGenerated;
      document.getElementById("gh-area").style.display = "none";
    }

    function clearAll() {
      document.getElementById("pabx").value = "";
      document.getElementById("output").textContent = "Isi PABX dan pilih template, lalu klik Generate Tiket...";
      document.getElementById("gh-area").style.display = "none";
      lastGenerated = "";
    }

    function copyText() {
      if (!lastGenerated) return;
      navigator.clipboard.writeText(lastGenerated).then(() => {
        const fb = document.getElementById("copy-fb");
        fb.style.opacity = 1;
        setTimeout(() => fb.style.opacity = 0, 2000);
      });
    }

    async function openGithub() {
      if (!lastGenerated) { alert("Generate tiket terlebih dahulu."); return; }
      const pabx = document.getElementById("pabx").value.trim() || "PABX";
      const idx = document.getElementById("template").value;
      const filename = ("tiket_" + pabx + "_" + (idx * 1 + 1) + ".txt").replace(/\s+/g, "_");
      try {
        const res = await fetch("https://api.github.com/gists", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ description: "Tiket " + pabx, public: true, files: { [filename]: { content: lastGenerated } } })
        });
        const data = await res.json();
        if (data.html_url) {
          document.getElementById("gh-area").style.display = "block";
          document.getElementById("gh-link").textContent = data.html_url;
          window.open(data.html_url, "_blank");
        } else { alert("Gagal membuat Gist."); }
      } catch { alert("Gagal terhubung ke GitHub API."); }
    }

    function openManager() {
      renderList();
      showTab("list");
      document.getElementById("modal").style.display = "flex";
    }
    function closeManager() { document.getElementById("modal").style.display = "none"; }
    function bgClose(e) { if (e.target.id === "modal") closeManager(); }

    function showTab(tab) {
      document.getElementById("tab-list").style.display = tab === "list" ? "block" : "none";
      document.getElementById("tab-add").style.display = tab === "add" ? "block" : "none";
      document.getElementById("tab-list-btn").className = tab === "list" ? "btn-primary" : "btn-secondary";
      document.getElementById("tab-add-btn").className = tab === "add" ? "btn-primary" : "btn-secondary";
      if (tab === "add") {
        document.getElementById("modal-title").textContent = "Tambah Template Baru";
        document.getElementById("edit-index").value = -1;
        document.getElementById("new-name").value = "";
        document.getElementById("new-body").value = "";
      } else {
        document.getElementById("modal-title").textContent = "Kelola Template";
      }
    }

    function renderList() {
      const list = document.getElementById("tpl-list");
      list.innerHTML = "";
      templates.forEach((t, i) => {
        const div = document.createElement("div");
        div.className = "tpl-item";
        div.innerHTML = `<span title="${t.name}">${t.name}</span>
          <div class="tpl-item-btns">
            <button class="btn-secondary" style="font-size:12px;padding:4px 10px;" onclick="editTemplate(${i})">Edit</button>
            <button class="btn-danger" style="font-size:12px;padding:4px 10px;" onclick="deleteTemplate(${i})">Hapus</button>
          </div>`;
        list.appendChild(div);
      });
    }

    function editTemplate(i) {
      document.getElementById("modal-title").textContent = "Edit Template";
      document.getElementById("edit-index").value = i;
      document.getElementById("new-name").value = templates[i].name;
      document.getElementById("new-body").value = templates[i].body;
      document.getElementById("tab-list").style.display = "none";
      document.getElementById("tab-add").style.display = "block";
      document.getElementById("tab-list-btn").className = "btn-secondary";
      document.getElementById("tab-add-btn").className = "btn-primary";
    }

    function deleteTemplate(i) {
      if (templates.length <= 1) { alert("Minimal harus ada 1 template."); return; }
      if (!confirm("Hapus template \"" + templates[i].name + "\"?")) return;
      templates.splice(i, 1);
      saveTemplates(templates);
      rebuildSelect();
      renderList();
    }

    function saveTemplate() {
      const name = document.getElementById("new-name").value.trim();
      const body = document.getElementById("new-body").value;
      if (!name) { alert("Nama template tidak boleh kosong."); return; }
      if (!body.trim()) { alert("Isi template tidak boleh kosong."); return; }
      const idx = parseInt(document.getElementById("edit-index").value);
      if (idx >= 0) {
        templates[idx] = { name, body };
      } else {
        templates.push({ name, body });
      }
      saveTemplates(templates);
      rebuildSelect();
      renderList();
      showTab("list");
    }

    rebuildSelect();
  </script>
</body>
</html>
